<div style="font-family: system-ui, sans-serif, Arial; font-size: 14px; color: #2c1f22; background: #fff8f9; padding: 24px;">
  <div style="max-width: 600px; margin: auto; background: #ffffff; border: 1px solid #f3d9df; border-radius: 32px; overflow: hidden;">
    <div style="text-align: center; background-color: #ffc002; padding: 32px 16px;">
      <img src="https://i.ibb.co/zVs1FJcy/Gemini-Generated-Image-y4zvx4y4zvx4y4zv.png" alt="Women Secret Nails" style="max-width: 200px; height: auto;">

    <div style="padding: 28px 22px;">

        Women Secret Nails
      </p>

      <h1 style="font-size: 26px; line-height: 1.2; margin: 0 0 18px; text-align: center; color: #2c1f22;">
        {{title}}
      </h1>

      <p style="line-height: 1.7; margin: 0 0 22px; text-align: center;">
        {{intro}}
      </p>

      <div style="white-space: pre-line; background: #fff4f6; border: 1px solid #f3d9df; border-radius: 18px; padding: 18px; line-height: 1.7; margin-bottom: 24px;">
        {{details}}
      </div>

      <p style="text-align: center; margin: 0;">
        <a href="{{cta_url}}" style="display: inline-block; background-color: #ffc002; color: #000000; padding: 12px 22px; text-decoration: none; border-radius: 999px; font-weight: bold;">
          {{cta_text}}
        </a>
      </p>
    </div>

    <div style="text-align: center; background-color: #ffc002; padding: 16px;">
      <p style="margin: 0 0 8px;">Para cualquier consulta, contactanos por telefono:</p>
      <p style="margin: 0 0 8px;"><strong><a style="color: #212121;" href="tel:3017886217">3017886217</a></strong></p>
      <p style="margin: 0 0 8px;">o por correo electronico:</p>
      <p style="margin: 0;"><strong><a style="color: #212121;" href="mailto:tatismahecha01@gmail.com">tatismahecha01@gmail.com</a></strong></p>
    </div>
  </div>
</div>
