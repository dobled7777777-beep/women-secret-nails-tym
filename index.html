<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Women Secret Nails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--cream);
      flex-direction: column;
      gap: 16px;
    }
    .gate-logo {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 600;
      color: var(--rose-deep);
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s forwards;
    }
    .gate-spinner {
      opacity: 0;
      animation: fadeUp 0.5s 0.3s forwards;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <p class="gate-logo">WSN</p>
  <div class="gate-spinner">
    <div class="loading-spinner"></div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyDFsFLw518RovvIPGcIzFDrih4oKBKgz-o",
      authDomain:        "women-secret-nails.firebaseapp.com",
      projectId:         "women-secret-nails",
      storageBucket:     "women-secret-nails.firebasestorage.app",
      messagingSenderId: "245460116956",
      appId:             "1:245460116956:web:a0881d15b5bbf76119db19"
    };

    const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const isGuest = sessionStorage.getItem("wsn-guest") === "true";

    // Una sola decisión: ¿tiene sesión? → home. ¿no? → login
    onAuthStateChanged(auth, user => {
      if (user || isGuest) {
        window.location.replace("home.html");
      } else {
        window.location.replace("login.html");
      }
    });
  </script>
</body>
</html>
