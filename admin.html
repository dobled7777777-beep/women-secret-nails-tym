<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin · Women Secret Nails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 0 clamp(16px,4vw,40px) 80px;
      position: relative; z-index: 1;
    }

    /* ── Login ── */
    .login-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 68px); padding: 40px 20px;
    }
    .login-card {
      background: white; border-radius: var(--radius-lg);
      padding: 44px 40px; max-width: 420px; width: 100%;
      box-shadow: var(--shadow-modal);
      border: 1px solid rgba(212,184,150,0.2); text-align: center;
    }
    .login-icon { font-size: 42px; margin-bottom: 16px; }
    .login-card h2 {
      font-family: var(--font-display); font-size: 30px;
      font-weight: 400; color: var(--text-dark); margin-bottom: 6px;
    }
    .login-sub { font-size: 14px; color: var(--text-light); margin-bottom: 32px; font-weight: 300; line-height: 1.6; }
    .btn-google {
      width: 100%; padding: 13px; background: white; color: #3c4043;
      border: 1px solid #dadce0; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background var(--transition), box-shadow var(--transition); margin-bottom: 12px;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:rgba(212,184,150,0.3); }
    .auth-divider span { font-size: 11px; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; }
    .login-field {
      width: 100%; padding: 13px 16px;
      border: 1px solid rgba(212,184,150,0.4); border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px;
      background: var(--nude-pale); color: var(--text-dark);
      outline: none; margin-bottom: 12px; transition: border-color var(--transition);
    }
    .login-field:focus { border-color: var(--rose); }
    .login-error {
      background: var(--rose-pale); border: 1px solid rgba(201,123,138,0.3);
      border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px;
      color: var(--rose-deep); margin-bottom: 14px; display: none; text-align: left;
    }

    /* ── Panel ── */
    .admin-topbar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .admin-user { display: flex; align-items: center; gap: 10px; }
    .admin-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--rose-pale); border: 2px solid var(--rose-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; overflow: hidden;
    }
    .admin-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .admin-user-name { font-size: 13px; color: var(--text-mid); }
    .btn-signout {
      padding: 8px 18px; background: transparent; color: var(--text-light);
      border: 1px solid rgba(107,77,85,0.2); border-radius: var(--radius-xl);
      font-family: var(--font-body); font-size: 12px; cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .btn-signout:hover { color: var(--rose-deep); border-color: var(--rose); }

    /* Tabs */
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 8px 18px; border-radius: var(--radius-xl);
      border: 1px solid rgba(212,184,150,0.3); background: white;
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid);
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--rose-deep); border-color: var(--rose-deep); color: white; }
    .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 50%;
      background: rgba(255,255,255,0.25); font-size: 10px; padding: 0 4px;
    }
    .tab-btn:not(.active) .tab-count { background: var(--rose-pale); color: var(--rose-deep); }

    /* Filtro */
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); }
    .filter-date {
      padding: 8px 14px; border: 1px solid rgba(212,184,150,0.35);
      border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px;
      background: var(--nude-pale); color: var(--text-dark); outline: none;
    }

    /* Reservation cards */
    .reservation-card {
      background: white; border-radius: var(--radius-md);
      padding: 22px 24px; margin-bottom: 14px;
      box-shadow: var(--shadow-card); border: 1px solid rgba(212,184,150,0.15);
      opacity: 0; animation: fadeUp 0.3s forwards;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .reservation-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(44,31,34,0.1); }
    .res-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .res-service { font-family: var(--font-display); font-size: 22px; font-weight: 400; color: var(--text-dark); line-height: 1.1; }
    .res-client { font-size: 13px; color: var(--text-mid); margin-top: 3px; }
    .res-specialist { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .status-badge {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 12px; border-radius: var(--radius-xl); white-space: nowrap;
    }
    .badge-pendiente  { background: var(--gold-pale);  color: var(--nude-deep); }
    .badge-confirmada { background: #e8f5e9;            color: #388e3c; }
    .badge-cancelada  { background: var(--rose-pale);   color: var(--rose-deep); }
    .res-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 10px 20px; margin-bottom: 18px;
    }
    .res-item { display: flex; flex-direction: column; gap: 2px; }
    .res-item-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); }
    .res-item-value { font-size: 14px; color: var(--text-dark); }
    .phone-link { color: var(--rose-deep); text-decoration: none; font-size: 14px; }
    .phone-link:hover { text-decoration: underline; }

    /* Acciones */
    .res-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      flex: 1; min-width: 90px; padding: 9px 8px;
      border-radius: var(--radius-sm); font-family: var(--font-body);
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
    }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-confirmar  { background: #e8f5e9; color: #388e3c; border-color: #a5d6a7; }
    .btn-confirmar:hover:not(:disabled)  { background: #c8e6c9; }
    .btn-cancelar   { background: var(--rose-pale); color: var(--rose-deep); border-color: rgba(201,123,138,0.3); }
    .btn-cancelar:hover:not(:disabled)   { background: var(--rose-soft); }
    .btn-pendiente  { background: var(--gold-pale); color: var(--nude-deep); border-color: rgba(212,184,150,0.4); }
    .btn-pendiente:hover:not(:disabled)  { background: #ede0c4; }

    /* Botón WhatsApp en card */
    .btn-wa-confirm {
      flex: 1; min-width: 120px; padding: 9px 8px;
      border-radius: var(--radius-sm); font-family: var(--font-body);
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.2s;
      background: #e8f9ee; color: #1a7a3c;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      text-decoration: none;
    }
    .btn-wa-confirm:hover { background: #25D366; color: white; }

    /* Toast */
    .admin-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-dark); color: white;
      padding: 14px 22px; border-radius: var(--radius-xl); font-size: 13px;
      z-index: 9999; transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.35s;
      opacity: 0; max-width: 92vw; text-align: center;
      box-shadow: 0 8px 32px rgba(44,31,34,0.25);
    }
    .admin-toast--show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Badge nueva reserva */
    .new-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--rose-deep); color: white;
      font-size: 11px; font-weight: 500; padding: 4px 12px;
      border-radius: var(--radius-xl); animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,123,138,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(201,123,138,0); }
    }

    /* Empty / loading */
    .admin-empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .admin-empty-icon { font-size: 40px; margin-bottom: 12px; }
    .admin-empty p { font-size: 14px; font-weight: 300; }
    .admin-loading { text-align: center; padding: 50px; color: var(--text-light); font-size: 14px; }

    /* Mobile */
    @media(max-width:480px) {
      .res-grid { grid-template-columns: 1fr; }
      .res-actions { flex-direction: column; }
      .action-btn, .btn-wa-confirm { min-width: unset; width: 100%; }
    }
  </style>
</head>
<body class="services-page">
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo-mark">WSN</a>
      <nav class="header-nav">
        <a href="index.html">Inicio</a>
        <a href="services.html">Servicios</a>
        <span class="nav-current">Admin</span>
      </nav>
    </div>
  </header>

  <!-- ── LOGIN ── -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h2>Panel privado</h2>
      <p class="login-sub">Solo la administradora puede acceder aquí.</p>
      <button class="btn-google" id="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Entrar con Google
      </button>
      <div class="auth-divider"><span>o</span></div>
      <input type="email"    class="login-field" id="login-email"    placeholder="Correo electrónico">
      <input type="password" class="login-field" id="login-password" placeholder="Contraseña">
      <div class="login-error" id="login-error"></div>
      <button class="btn-primary btn-full" id="btn-email-login" style="margin-top:0;">Entrar</button>
    </div>
  </div>

  <!-- ── PANEL ADMIN ── -->
  <div id="admin-panel" class="admin-wrap" style="display:none;">
    <div class="page-title" style="padding-left:0;padding-right:0;text-align:left;padding-bottom:20px;">
      <p class="page-eyebrow">Panel de administración</p>
      <h1 class="page-heading" style="font-size:clamp(32px,5vw,52px);">
        Mis <em>reservas</em>
        <span id="new-reservations-badge" style="display:none;" class="new-badge">
          🔔 <span id="new-count">0</span> nuevas
        </span>
      </h1>
    </div>

    <div class="admin-topbar">
      <div class="admin-user">
        <div class="admin-avatar" id="admin-avatar">💅</div>
        <span class="admin-user-name" id="admin-user-name"></span>
      </div>
      <button class="btn-signout" id="btn-signout">Cerrar sesión</button>
    </div>

    <div class="filter-row">
      <span class="filter-label">Día:</span>
      <input type="date" class="filter-date" id="filter-date">
      <button class="btn-ghost" id="btn-show-all" style="padding:8px 16px;font-size:12px;">Ver todas</button>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" data-status="pendiente">
        Pendientes <span class="tab-count" id="cnt-pendiente">0</span>
      </button>
      <button class="tab-btn" data-status="confirmada">
        Confirmadas <span class="tab-count" id="cnt-confirmada">0</span>
      </button>
      <button class="tab-btn" data-status="cancelada">
        Canceladas <span class="tab-count" id="cnt-cancelada">0</span>
      </button>
    </div>

    <div id="reservations-list">
      <div class="admin-loading">
        <div class="loading-spinner" style="margin:0 auto 12px;"></div>
        Cargando reservas...
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="admin-toast" class="admin-toast"></div>

  <script type="module">
    import { initializeApp, getApps, getApp }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, doc, updateDoc, query, orderBy, onSnapshot }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup,
             GoogleAuthProvider, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { notifyClientEmail, buildClientWhatsAppUrl }
      from "./js/notifications.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyDFsFLw518RovvIPGcIzFDrih4oKBKgz-o",
      authDomain:        "women-secret-nails.firebaseapp.com",
      projectId:         "women-secret-nails",
      storageBucket:     "women-secret-nails.firebasestorage.app",
      messagingSenderId: "245460116956",
      appId:             "1:245460116956:web:a0881d15b5bbf76119db19"
    };

    const AUTHORIZED_EMAIL = "tatismahecha01@gmail.com";
    const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const gProvider = new GoogleAuthProvider();

    const loginScreen = document.getElementById("login-screen");
    const adminPanel  = document.getElementById("admin-panel");
    const loginError  = document.getElementById("login-error");
    const listEl      = document.getElementById("reservations-list");
    const filterDate  = document.getElementById("filter-date");
    const toastEl     = document.getElementById("admin-toast");

    let allRes     = [];
    let curStatus  = "pendiente";
    let dateFilter = null;
    let unsubRes   = null;
    let prevPendienteCount = -1; // para detectar reservas nuevas

    // Hoy por defecto
    const now = new Date();
    filterDate.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
    dateFilter = filterDate.value;

    // ── Toast helper ──────────────────────────────────────────────────────────
    function showToast(msg, duration = 4000) {
      toastEl.textContent = msg;
      toastEl.classList.add("admin-toast--show");
      setTimeout(() => toastEl.classList.remove("admin-toast--show"), duration);
    }

    // ── Sonido de notificación ────────────────────────────────────────────────
    function playNotifSound() {
      try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      } catch(e) { /* silencioso si no hay contexto de audio */ }
    }

    // ── Auth ──────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user && user.email === AUTHORIZED_EMAIL) {
        loginScreen.style.display = "none";
        adminPanel.style.display  = "block";
        document.getElementById("admin-user-name").textContent = user.displayName || user.email;
        const av = document.getElementById("admin-avatar");
        av.innerHTML = user.photoURL ? `<img src="${user.photoURL}" alt="">` : "💅";
        subscribeReservations(); // ✅ Tiempo real
      } else if (user) {
        showErr("Este correo no tiene acceso.");
        signOut(auth);
      } else {
        loginScreen.style.display = "flex";
        adminPanel.style.display  = "none";
        if (unsubRes) { unsubRes(); unsubRes = null; }
      }
    });

    document.getElementById("btn-google").onclick = async () => {
      try { await signInWithPopup(auth, gProvider); }
      catch { showErr("Error con Google. Intenta de nuevo."); }
    };
    document.getElementById("btn-email-login").onclick = loginEmail;
    document.getElementById("login-password").addEventListener("keydown", e => {
      if (e.key === "Enter") loginEmail();
    });
    async function loginEmail() {
      const email = document.getElementById("login-email").value.trim();
      const pass  = document.getElementById("login-password").value;
      if (!email || !pass) { showErr("Ingresa tu correo y contraseña."); return; }
      try { await signInWithEmailAndPassword(auth, email, pass); }
      catch { showErr("Correo o contraseña incorrectos."); }
    }
    document.getElementById("btn-signout").onclick = () => signOut(auth);
    function showErr(msg) { loginError.textContent = msg; loginError.style.display = "block"; }

    // ══════════════════════════════════════════════════════════════════════════
    // ✅ TIEMPO REAL — onSnapshot para reservas
    // La admin ve las nuevas citas al instante sin recargar
    // ══════════════════════════════════════════════════════════════════════════
    function subscribeReservations() {
      if (unsubRes) unsubRes();
      listEl.innerHTML = `<div class="admin-loading"><div class="loading-spinner" style="margin:0 auto 12px;"></div>Cargando...</div>`;

      const q = query(collection(db, "reservations"), orderBy("date","asc"), orderBy("time","asc"));
      unsubRes = onSnapshot(q, snap => {
        allRes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Detectar reservas nuevas pendientes → sonido + badge
        const pendienteCount = allRes.filter(r =>
          r.status === "pendiente" && (!dateFilter || r.date === dateFilter)
        ).length;

        if (prevPendienteCount !== -1 && pendienteCount > prevPendienteCount) {
          const diff = pendienteCount - prevPendienteCount;
          playNotifSound();
          showToast(`🔔 ${diff} nueva${diff > 1 ? "s" : ""} cita${diff > 1 ? "s" : ""} pendiente${diff > 1 ? "s" : ""}!`);
          document.title = `(${pendienteCount}) Admin · WSN`;
          const badge = document.getElementById("new-reservations-badge");
          const countEl = document.getElementById("new-count");
          if (badge && countEl) {
            countEl.textContent = diff;
            badge.style.display = "inline-flex";
            setTimeout(() => { badge.style.display = "none"; }, 8000);
          }
        }
        prevPendienteCount = pendienteCount;

        updateCounts();
        renderList();
      }, err => {
        console.error(err);
        listEl.innerHTML = `<p style="text-align:center;color:var(--rose-deep);padding:40px;">Error cargando reservas.</p>`;
      });
    }

    function updateCounts() {
      ["pendiente","confirmada","cancelada"].forEach(s => {
        document.getElementById(`cnt-${s}`).textContent =
          allRes.filter(r => r.status === s && (!dateFilter || r.date === dateFilter)).length;
      });
    }

    // ── Renderizar lista ──────────────────────────────────────────────────────
    function renderList() {
      const list = allRes.filter(r =>
        r.status === curStatus && (!dateFilter || r.date === dateFilter)
      );
      if (!list.length) {
        const icons = { pendiente:"🎉", confirmada:"📅", cancelada:"🚫" };
        listEl.innerHTML = `<div class="admin-empty">
          <div class="admin-empty-icon">${icons[curStatus]}</div>
          <p>No hay reservas ${curStatus === "pendiente" ? "pendientes"
            : curStatus === "confirmada" ? "confirmadas" : "canceladas"}
            ${dateFilter ? "para este día." : "aún."}</p>
        </div>`;
        return;
      }
      listEl.innerHTML = "";
      list.forEach((res, i) => {
        const card = document.createElement("div");
        card.className = "reservation-card";
        card.style.animationDelay = `${i*0.05}s`;

        const pIcon = res.payment === "efectivo" ? "💵" : "📱";
        const pStr  = res.payment === "efectivo" ? "Efectivo" : "Nequi / Daviplata";
        const clientName = res.clientName || res.client || "Sin nombre";
        const phoneHtml  = res.phone
          ? `<a href="tel:${res.phone}" class="phone-link">📞 ${res.phone}</a>`
          : `<span style="color:var(--text-light);font-size:13px;">Sin teléfono</span>`;

        card.innerHTML = `
          <div class="res-top">
            <div>
              <p class="res-service">${res.service || "Servicio"}</p>
              <p class="res-client">👤 ${clientName}</p>
              <p class="res-specialist">👩‍💼 ${res.specialist || "Sin asignar"}</p>
            </div>
            <span class="status-badge badge-${res.status}">${res.status}</span>
          </div>
          <div class="res-grid">
            <div class="res-item">
              <span class="res-item-label">Fecha</span>
              <span class="res-item-value">📅 ${fmtDate(res.date)}</span>
            </div>
            <div class="res-item">
              <span class="res-item-label">Hora</span>
              <span class="res-item-value">🕐 ${fmtTime(res.time)}</span>
            </div>
            <div class="res-item">
              <span class="res-item-label">Duración</span>
              <span class="res-item-value">⏱ ${res.duration || "—"} min</span>
            </div>
            <div class="res-item">
              <span class="res-item-label">Pago</span>
              <span class="res-item-value">${pIcon} ${pStr}</span>
            </div>
            <div class="res-item">
              <span class="res-item-label">Contacto</span>
              <span class="res-item-value">${phoneHtml}</span>
            </div>
          </div>
          <div class="res-actions">
            <button class="action-btn btn-confirmar"
              data-id="${res.id}" data-action="confirmada"
              ${res.status === "confirmada" ? "disabled" : ""}>
              ✓ Confirmar
            </button>
            <button class="action-btn btn-pendiente"
              data-id="${res.id}" data-action="pendiente"
              ${res.status === "pendiente" ? "disabled" : ""}>
              ⏳ En espera
            </button>
            <button class="action-btn btn-cancelar"
              data-id="${res.id}" data-action="cancelada"
              ${res.status === "cancelada" ? "disabled" : ""}>
              ✕ Cancelar
            </button>
          </div>`;
        listEl.appendChild(card);
      });

      // Eventos botones
      listEl.querySelectorAll(".action-btn:not(:disabled)").forEach(btn => {
        btn.onclick = () => changeStatus(btn.dataset.id, btn.dataset.action, btn);
      });
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ✅ CAMBIAR ESTADO + NOTIFICAR A LA CLIENTA
    // ══════════════════════════════════════════════════════════════════════════
    async function changeStatus(id, newStatus, btn) {
      const actions = btn.closest(".res-actions");
      const prev    = actions.innerHTML;
      actions.innerHTML = `<p style="font-size:13px;color:var(--text-light);padding:6px;">Guardando...</p>`;

      try {
        await updateDoc(doc(db, "reservations", id), { status: newStatus });

        // ✅ Si se CONFIRMÓ → notificar a la clienta
        if (newStatus === "confirmada") {
          const res = allRes.find(r => r.id === id);
          if (res) {
            // Email automático a la clienta (si tiene email)
            await notifyClientEmail({
              clientEmail: res.userEmail,
              clientName:  res.clientName || res.client || "Clienta",
              service:     res.service,
              date:        fmtDate(res.date),
              time:        fmtTime(res.time),
              specialist:  res.specialist || "—",
            });

            // Abrir WhatsApp con mensaje pre-escrito para la clienta
            if (res.phone) {
              const waUrl = buildClientWhatsAppUrl({
                phone:      res.phone,
                clientName: res.clientName || res.client || "Clienta",
                service:    res.service,
                date:       fmtDate(res.date),
                time:       fmtTime(res.time),
                specialist: res.specialist || "—",
              });
              window.open(waUrl, "_blank");
              showToast("✅ Cita confirmada. Se abrió WhatsApp para notificar a la clienta 💅");
            } else {
              showToast("✅ Cita confirmada. Email enviado a la clienta 💅");
            }
          }
        }
        // onSnapshot actualiza la lista automáticamente
      } catch(err) {
        console.error(err);
        actions.innerHTML = prev;
        showToast("❌ Error al actualizar. Intenta de nuevo.");
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => btn.onclick = () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      curStatus = btn.dataset.status;
      renderList();
    });

    filterDate.onchange = () => {
      dateFilter = filterDate.value || null;
      prevPendienteCount = -1;
      updateCounts(); renderList();
    };
    document.getElementById("btn-show-all").onclick = () => {
      filterDate.value = ""; dateFilter = null;
      prevPendienteCount = -1;
      updateCounts(); renderList();
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmtDate(s) {
      if (!s) return "—";
      const [y,m,d] = s.split("-");
      const M = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
      return `${parseInt(d)} ${M[parseInt(m)-1]} ${y}`;
    }
    function fmtTime(t) {
      if (!t) return "—";
      const [h,m] = t.split(":").map(Number);
      return `${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"pm":"am"}`;
    }
  </script>
</body>
</html>
