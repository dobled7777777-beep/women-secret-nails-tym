<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>💅 Nuestros Servicios</h1>

<div class="services-container"></div>

<!-- Modal de reserva -->
<div id="reservation-modal" class="modal" style="display:none;">
  <div class="modal-content">
    <span id="close-modal" style="cursor:pointer;">&times;</span>
    <h2>Reservar Servicio</h2>
    <p id="selected-service"></p>
    <label for="date">Selecciona la fecha:</label>
    <input type="date" id="reservation-date">
    <label for="time">Selecciona la hora:</label>
    <input type="time" id="reservation-time">
    <button id="confirm-reservation">Confirmar</button>
  </div>
</div>

<!-- Importamos JS de servicios -->
<script type="module" src="js/services.js"></script>

</body>
</html>
